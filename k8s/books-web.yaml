apiVersion: apps/v1
kind: Deployment
metadata:
  name: books-web
  labels:
    app: books-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: books-web
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: books-web
    spec:
      nodeSelector:
        kubernetes.io/hostname: nixos
      containers:
        - name: books-web
          image: books-web:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5001
              hostPort: 5001
              name: http
          env:
            - name: BOOKS_DIR
              value: /books
            - name: PORT
              value: "5001"
            - name: UPLOAD_PASSWORD_HASH
              valueFrom:
                secretKeyRef:
                  name: books-web-auth
                  key: password-hash
            - name: UPLOAD_PEPPER
              valueFrom:
                secretKeyRef:
                  name: books-web-auth
                  key: pepper
            - name: VOYAGE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: books-web-auth
                  key: voyage-api-key
          volumeMounts:
            - name: books-volume
              mountPath: /books
              readOnly: false
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: books-volume
          hostPath:
            path: /mnt/ssdb/books
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: books-web
spec:
  selector:
    app: books-web
  ports:
    - port: 5001
      targetPort: 5001
