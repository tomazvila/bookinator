name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5

      - name: Run tests
        run: |
          nix develop --command bash -c '
            export PYTHONPATH="$PWD/src:$PYTHONPATH"
            python -m pytest tests/ -v -m "not integration"
          '

  build:
    runs-on: self-hosted
    needs: test
    steps:
      - uses: actions/checkout@v5

      - name: Nix build
        run: nix build

      - name: Nix flake check
        run: nix flake check

  deploy:
    runs-on: self-hosted
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      PATH: /run/wrappers/bin:/run/current-system/sw/bin:/usr/bin:/bin
      KUBECONFIG: /home/ghrunner/.kube/config
    steps:
      - uses: actions/checkout@v5

      - name: Build container image with Nix
        run: nix build .#docker

      - name: Import image into k3s
        run: |
          k3s ctr images rm docker.io/library/books-web:latest 2>/dev/null || true
          k3s ctr images import ./result

      - name: Restart deployment
        run: |
          kubectl rollout restart deployment/books-web
          kubectl rollout status deployment/books-web --timeout=120s
