name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: |
          nix develop --command bash -c '
            export PYTHONPATH="$PWD/src:$PYTHONPATH"
            python -m pytest tests/ -v -m "not integration"
          '

  build:
    runs-on: self-hosted
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Nix build
        run: nix build

      - name: Nix flake check
        run: nix flake check
