{% extends "base.html" %}

{% block content %}
<div id="upload-panel" class="upload-panel" hidden>
    <form id="upload-form" class="upload-form">
        <div class="upload-row">
            <label for="upload-file" class="upload-dropzone" id="dropzone">
                <span id="dropzone-text">Choose file or drag & drop</span>
                <span class="upload-hint">PDF, EPUB, MOBI, DJVU, AZW3, CBZ</span>
                <input type="file" id="upload-file" accept=".pdf,.epub,.mobi,.djvu,.azw3,.cbz" hidden>
            </label>
        </div>
        <div class="upload-fields">
            <select id="upload-category" class="upload-input">
                <option value="uncategorized">Uncategorized</option>
                <option value="programming">Programming</option>
                <option value="computer-science">Computer Science</option>
                <option value="mathematics">Mathematics</option>
                <option value="physics">Physics</option>
                <option value="finance-and-investing">Finance & Investing</option>
                <option value="business-and-management">Business & Management</option>
                <option value="philosophy">Philosophy</option>
                <option value="psychology">Psychology</option>
                <option value="self-help">Self Help</option>
                <option value="history">History</option>
                <option value="science">Science</option>
                <option value="fiction">Fiction</option>
                <option value="reference">Reference</option>
                <option value="art-and-design">Art & Design</option>
            </select>
            <input type="password" id="upload-password" class="upload-input" placeholder="Password" required autocomplete="off">
            <button type="submit" id="upload-submit" class="upload-btn" disabled>Upload</button>
        </div>
        <div id="upload-status" class="upload-status" hidden></div>
    </form>
</div>

<div class="search-container">
    <input type="text" id="search" placeholder="Search books...  ( / )" autocomplete="off" autofocus>
    <div id="categories" class="categories"></div>
</div>

<div id="stats" class="stats"></div>
<div id="results" class="results"></div>
{% endblock %}

{% block scripts %}
<script>
const searchInput = document.getElementById('search');
const categoriesEl = document.getElementById('categories');
const resultsEl = document.getElementById('results');
const statsEl = document.getElementById('stats');
let activeCategory = null;
let debounceTimer = null;
let selectedIndex = -1;
let totalBooks = 0;
let currentBooks = [];

function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(1) + ' MB';
}

function extClass(ext) {
    const map = {pdf: 'ext-pdf', epub: 'ext-epub', mobi: 'ext-mobi', djvu: 'ext-djvu', azw3: 'ext-azw3', cbz: 'ext-cbz'};
    return map[ext] || '';
}

function humanize(slug) {
    return slug.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase())
        .replace(/\bAnd\b/g, '&');
}

async function loadCategories() {
    const resp = await fetch('/api/categories');
    const data = await resp.json();
    totalBooks = data.categories.reduce((sum, c) => sum + c.count, 0);
    let html = '<button class="chip active" data-cat="">All <span class="count">' + totalBooks + '</span></button>';
    for (const cat of data.categories) {
        html += `<button class="chip" data-cat="${cat.category}">${humanize(cat.category)} <span class="count">${cat.count}</span></button>`;
    }
    categoriesEl.innerHTML = html;
    categoriesEl.querySelectorAll('.chip').forEach(btn => {
        btn.addEventListener('click', () => {
            categoriesEl.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeCategory = btn.dataset.cat || null;
            doSearch();
        });
    });
}

async function doSearch() {
    const q = searchInput.value.trim();
    const params = new URLSearchParams({q, limit: '100'});
    if (activeCategory) params.set('category', activeCategory);
    resultsEl.style.opacity = '0.6';
    const resp = await fetch('/api/search?' + params);
    const data = await resp.json();
    resultsEl.style.opacity = '1';
    currentBooks = data.results;
    selectedIndex = -1;
    renderResults(data.results, data.count);
}

function renderResults(books, count) {
    const filtered = activeCategory || searchInput.value.trim();
    if (filtered && totalBooks) {
        statsEl.textContent = count + ' of ' + totalBooks + (count === 1 ? ' book' : ' books');
    } else {
        statsEl.textContent = count + (count === 1 ? ' book' : ' books');
    }

    if (!books.length) {
        const q = searchInput.value.trim();
        let msg = '<p class="empty-heading">No books found</p>';
        if (q) {
            msg += '<p class="empty-sub">No results for "' + esc(q) + '"';
            if (activeCategory) msg += ' in ' + humanize(activeCategory);
            msg += '</p>';
        } else if (activeCategory) {
            msg += '<p class="empty-sub">No books in ' + humanize(activeCategory) + ' yet</p>';
        }
        if (activeCategory) {
            msg += '<p class="empty-sub">Try searching in All categories</p>';
        }
        resultsEl.innerHTML = '<div class="empty">' + msg + '</div>';
        return;
    }
    let html = '<table><thead><tr><th>Title</th><th>Author</th><th>Category</th><th>Type</th><th>Size</th><th></th></tr></thead><tbody>';
    for (let i = 0; i < books.length; i++) {
        const b = books[i];
        const matchBadge = b.match_type === 'semantic' || b.match_type === 'hybrid'
            ? '<span class="match-badge">content match</span>' : '';
        const matchCtx = b.match_context
            ? `<div class="match-context">${esc(b.match_context)}</div>` : '';
        html += `<tr class="clickable-row" tabindex="0" data-idx="${i}" data-href="/book/${b.id}" data-dl="/download/${encodeURIComponent(b.category)}/${encodeURIComponent(b.filename)}">
            <td class="title-cell">${esc(b.title)}${matchBadge}${matchCtx}</td>
            <td>${esc(b.author)}</td>
            <td><span class="chip small">${humanize(esc(b.category))}</span></td>
            <td><span class="ext ${extClass(b.extension)}">${b.extension}</span></td>
            <td class="size">${formatSize(b.size_bytes)}</td>
            <td><a href="/download/${encodeURIComponent(b.category)}/${encodeURIComponent(b.filename)}" class="dl-btn" onclick="event.stopPropagation()">Download</a></td>
        </tr>`;
    }
    html += '</tbody></table>';
    resultsEl.innerHTML = html;

    resultsEl.querySelectorAll('.clickable-row').forEach(row => {
        row.addEventListener('click', () => window.location = row.dataset.href);
        row.addEventListener('keydown', e => {
            if (e.key === 'Enter') window.location = row.dataset.href;
        });
    });
}

function updateSelection(newIdx) {
    const rows = resultsEl.querySelectorAll('.clickable-row');
    if (!rows.length) return;
    if (newIdx < 0) newIdx = 0;
    if (newIdx >= rows.length) newIdx = rows.length - 1;
    rows.forEach(r => r.classList.remove('selected'));
    selectedIndex = newIdx;
    rows[selectedIndex].classList.add('selected');
    rows[selectedIndex].scrollIntoView({block: 'nearest'});
}

function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

searchInput.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(doSearch, 200);
});

document.addEventListener('keydown', e => {
    const inSearch = document.activeElement === searchInput;

    if (e.key === '/' && !inSearch) {
        e.preventDefault();
        searchInput.focus();
        return;
    }

    if (e.key === 'Escape') {
        searchInput.blur();
        selectedIndex = -1;
        resultsEl.querySelectorAll('.clickable-row').forEach(r => r.classList.remove('selected'));
        return;
    }

    if (inSearch) return;

    if (e.key === 'j' || e.key === 'ArrowDown') {
        e.preventDefault();
        updateSelection(selectedIndex + 1);
    } else if (e.key === 'k' || e.key === 'ArrowUp') {
        e.preventDefault();
        updateSelection(selectedIndex - 1);
    } else if (e.key === 'Enter' && selectedIndex >= 0) {
        const row = resultsEl.querySelector(`.clickable-row[data-idx="${selectedIndex}"]`);
        if (row) window.location = row.dataset.href;
    } else if (e.key === 'd' && selectedIndex >= 0) {
        e.preventDefault();
        const row = resultsEl.querySelector(`.clickable-row[data-idx="${selectedIndex}"]`);
        if (row) window.location = row.dataset.dl;
    }
});

// Upload
const uploadToggle = document.getElementById('upload-toggle');
const uploadPanel = document.getElementById('upload-panel');
const uploadForm = document.getElementById('upload-form');
const uploadFile = document.getElementById('upload-file');
const uploadSubmit = document.getElementById('upload-submit');
const uploadStatus = document.getElementById('upload-status');
const dropzone = document.getElementById('dropzone');
const dropzoneText = document.getElementById('dropzone-text');

uploadToggle.addEventListener('click', () => {
    const show = uploadPanel.hidden;
    uploadPanel.hidden = !show;
    uploadToggle.classList.toggle('active', show);
});

uploadFile.addEventListener('change', () => {
    if (uploadFile.files.length) {
        dropzoneText.textContent = uploadFile.files[0].name;
        dropzone.classList.add('has-file');
        uploadSubmit.disabled = false;
    }
});

dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.classList.remove('dragover');
    if (e.dataTransfer.files.length) {
        uploadFile.files = e.dataTransfer.files;
        dropzoneText.textContent = e.dataTransfer.files[0].name;
        dropzone.classList.add('has-file');
        uploadSubmit.disabled = false;
    }
});

uploadForm.addEventListener('submit', async e => {
    e.preventDefault();
    const file = uploadFile.files[0];
    if (!file) return;

    const pw = document.getElementById('upload-password').value;
    if (!pw) { showUploadStatus('Password required', true); return; }

    uploadSubmit.disabled = true;
    uploadSubmit.textContent = 'Uploading...';

    const fd = new FormData();
    fd.append('file', file);
    fd.append('category', document.getElementById('upload-category').value);
    fd.append('password', pw);

    try {
        const resp = await fetch('/api/upload', {method: 'POST', body: fd});
        if (resp.status === 413) {
            const sizeMB = (file.size / 1048576).toFixed(0);
            showUploadStatus('File too large (' + sizeMB + ' MB) — max 100 MB via browser. Use rsync instead.', true);
        } else if (resp.ok) {
            const data = await resp.json();
            showUploadStatus('Uploaded ' + esc(data.filename) + ' to ' + humanize(data.category), false);
            uploadForm.reset();
            dropzoneText.textContent = 'Choose file or drag & drop';
            dropzone.classList.remove('has-file');
            loadCategories();
            doSearch();
        } else {
            let msg = 'Upload failed (HTTP ' + resp.status + ')';
            try { const data = await resp.json(); msg = data.error || msg; } catch {}
            showUploadStatus(msg, true);
        }
    } catch (err) {
        showUploadStatus('Upload failed — check connection and try again', true);
    }
    uploadSubmit.disabled = false;
    uploadSubmit.textContent = 'Upload';
});

function showUploadStatus(msg, isError) {
    uploadStatus.hidden = false;
    uploadStatus.textContent = msg;
    uploadStatus.className = 'upload-status' + (isError ? ' error' : ' success');
    if (!isError) setTimeout(() => { uploadStatus.hidden = true; }, 4000);
}

document.addEventListener('keydown', e => {
    if (e.key === 'u' && document.activeElement === document.body) {
        e.preventDefault();
        uploadToggle.click();
    }
});

loadCategories();
doSearch();
</script>
{% endblock %}
